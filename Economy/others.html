                options: ["fall in domestic prices", "increase in domestic prices", "no impact on domestic prices", "erratic fluctuations in domestic prices"],
                answer: 1
            },
            {
                question: "Deficit financing implies",
                options: ["printing new currency notes", "replacing new currency with worn out currency", "public expenditure in excess of public revenue", "public revenue in excess of public expenditure"],
                answer: 2
            },
            {
                question: "In which of the following sequences the change in quantity of money leads to change in price level in the Keynesian models?",
                options: ["Change in quantity of money - change in investment - change in employment and output - change in rate of interest - change in price level", "Change in quantity of money - change in employment and output - change in investment - change in the rate of interest - change in price level", "Change in quantity of money - change in investment - change in rate of interest - change in employment and output - change in price level", "Change in quantity of money - change in rate of interest - change in investment - change in employment and output - change in price level"],
                answer: 3
            },
            {
                question: "Which of the following is not a part of machinery that settles industrial disputes?",
                options: ["Wage Court", "Works Committee", "Conciliation officers", "Board of Conciliation"],
                answer: 0
            },
            {
                question: "One rupee currency note in India bears the signature of-",
                options: ["The president of India", "Finance minister of India", "Governor (RBI)", "Finance secretary of Government of India"],
                answer: 3
            },
            {
                question: "Ten rupee notes contain the signature of:",
                options: ["Finance Secretary, GOI", "Chairman, SBI", "Governor, RBI", "Finance Minister , GOI"],
                answer: 2
            }
        ];

        const wrapper = document.getElementById('questions-wrapper');

        quizData.forEach((item, index) => {
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.innerHTML = `<span class="text-amber-600 dark:text-amber-500 mr-2">Q${index + 1}.</span> ${item.question}`;
            questionBlock.appendChild(questionText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach((option, optionIndex) => {
                if (!option || option.trim() === '') return;
                
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    if (optionsList.classList.contains('answered')) return;
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;

                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });

                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            wrapper.appendChild(questionBlock);
        });

        // Theme sync
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
