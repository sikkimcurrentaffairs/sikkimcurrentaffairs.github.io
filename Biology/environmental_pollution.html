<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology - Environmental Pollution | Sikkim PSC Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0056b3;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #0056b3;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .question-block {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question-text {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .option:hover {
            background-color: #e9ecef;
            border-color: #bbb;
        }
        .option.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            font-weight: bold;
        }
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            font-weight: bold;
        }
        .options-list.answered .option:not(.correct):not(.incorrect) {
            opacity: 0.7;
        }
        .options-list.answered .option {
            cursor: default;
            pointer-events: none;
        }
        .quiz-stats {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.95em;
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <a href="biology.html" class="back-link">&larr; Back to Biology</a>
        <h1>Environmental Pollution</h1>
        <p class="quiz-stats">10 Questions</p>
        <!-- Questions will be dynamically inserted here by JavaScript -->
    </div>

    <script>
        const quizData = [
            {
                question: "Chief air pollutant which is likely to deplete ozone layer is",
                options: ["Sulphur dioxide", "Carbon dioxide", "Carbon monoxide", "Nitrogen oxides and fluorocarbons"],
                answer: 3
            },
            {
                question: "World environment day is",
                options: ["28thFeb", "SthJune", "7thJune", "10April"],
                answer: 1
            },
            {
                question: "G~ed during Bllg_2._al tragedy was",
                options: ["Methyl isocyanate · ·", "Potassium isothiocyanate", "Sodium isothiocyanate", "Ethyl isothiocyanate"],
                answer: 0
            },
            {
                question: "Carbon mono\'xide, emitted by automobiles, prevent transport of oxygen in body due to",
                options: ["Are resistaii:Cto pollution\'", "Can purify the atmosphere (cr Are very sensitive to pollutants", "Psreventing reaction between oxygen and haemoglobin Forming stable compound with haemoglobin 17\"\"\' Pollution indicator plants", "Can indicate onset of rain"],
                answer: 3
            },
            {
                question: "Acid rain is due to",
                options: ["Excess production of coal gas", "Excess release of C02 due lo increasing cumbustions and respiration", "Excess release of S02 and N02 from burning fossil fuels", "Excess production of gaseous hydrocarbon {UPCS (Pre) Uttrakhand 2008]"],
                answer: 2
            },
            {
                question: "Carbonmonoxide is harmful to human beings as it is",
                options: ["Carcinogenic", "Antagonistic to C02", "With higher affinity for haemoglobin as compared to oxygen", "Desturctive to 0 3"],
                answer: 2
            },
            {
                question: "Water pollution of a river is measured by",
                options: ["Amount of chlorine dissolve in water", "Amount of ozone dissolve in water", "Amount of nitrogen idssolve in water", "Amount of oxygen dissolve in water {lAS (Pre) 1978]"],
                answer: 3
            },
            {
                question: "Which of the following plroduce maximum soung F on- \'a) Top music",
                options: ["", "Cuttak", "Jamsedpur \'d)\' Nagpur", "None of these {UPPCS Lower Sub-ordinate 2003-04] National Environmental Engineering research institute l.s situated in- W Ranchi"],
                answer: 2
            },
            {
                question: "Methane as a green house gas is more harmful than carbon dioxide Which of the statements given above is I are correct.",
                options: ["1 & 2", "1 and 3", "1 only", "3 only"],
                answer: 1
            },
            {
                question: "The cloud seeding and formation of clouds will be adversely affected. Which of the statements given above is I are correct ?",
                options: ["1, 2 and 3 only", "2 only", "1 and 3 only", "1, 2, 3 and 4 {IAS 2012]"],
                answer: 0
            }
        ];

        const quizContainer = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.textContent = `${index + 1}) ${item.question}`;
            questionBlock.appendChild(questionText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach((option, optionIndex) => {
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    if (optionsList.classList.contains('answered')) {
                        return;
                    }
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;

                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });

                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            quizContainer.appendChild(questionBlock);
        });
    </script>
</body>
</html>
