<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology - Genetics and Evolution | Sikkim PSC Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0056b3;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #0056b3;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .question-block {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question-text {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .option:hover {
            background-color: #e9ecef;
            border-color: #bbb;
        }
        .option.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            font-weight: bold;
        }
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            font-weight: bold;
        }
        .options-list.answered .option:not(.correct):not(.incorrect) {
            opacity: 0.7;
        }
        .options-list.answered .option {
            cursor: default;
            pointer-events: none;
        }
        .quiz-stats {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.95em;
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <a href="biology.html" class="back-link">&larr; Back to Biology</a>
        <h1>Genetics and Evolution</h1>
        <p class="quiz-stats">37 Questions</p>

            {

            {

            {

            {

                options: ["Degenerate eyes of cave inhabiting animals", "Long neck and fore limbs of Giraffe", "Lack of limbs in snakes", "Medicare ability of nobel laureate\'s children"],

            {

            {

                options: ["Perking man", "Java man", "Neanderthal", "Austrolopithecus"],

            {

                answer: 2

            {
                question: "Early atmosphere contained methane and other hydrocarbons they have been now replaced by",
                options: ["Nitrogen", "Oxygen", "Carbon dioxide", "Hydrogen"],
                answer: 2

            {
                question: "Evolutionary history of an organism is known as",
                options: ["Ontogeny", "Phylogeny", "Ancestry", "Paleontology"],
                answer: 1
            },
            {
                question: "Industrial melanism is an example of",
                options: ["Drug resistance", "Darkeing of skins due to smoke from industries", "Protective resemblance with the surroundings", "Defensive adaptation of skin against ultraviolet radiations"],
                answer: 2
            },
            {

                options: ["Loss of tail", "Binocular vision", "Flat nails", "Shortening of jaws"],
                answer: 0
            },
            {
                question: "Convergent evoluton is illustrated by",
                options: ["Rat and dog", "Bacterium and protozoa", "Star fish and cuttlefish", "Dog fish and whales"],
                answer: 3
            },
            {

                options: ["Genotype of individuals of a population", "Different genes of all dividuals of a species", "Pool of artificially synthesised genes", "Gene of a genome"],
                answer: 1
            },
            {

                options: ["Extinction", "Ovar production", "Speiciation", "Competition"],
                answer: 2
            },
            {
                question: "Presence of gill in the tadpole of frog indicates that",
                options: ["Fish evolved from frog llike ancestor", "Frogs will have gills in future", "Frogs evolved from gilled ancestor", "Fishes were amphibious in the past"],
                answer: 2
            }
        ];

        const quizContainer = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.textContent = `${index + 1}) ${item.question}`;
            questionBlock.appendChild(questionText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach((option, optionIndex) => {
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    if (optionsList.classList.contains('answered')) {
                        return;
                    }
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;

                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });

                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            quizContainer.appendChild(questionBlock);
        });
    </script>
</body>
</html>
