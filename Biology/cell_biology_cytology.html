<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology - Cell Biology (Cytology) | Sikkim PSC Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0056b3;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #0056b3;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .question-block {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question-text {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .option:hover {
            background-color: #e9ecef;
            border-color: #bbb;
        }
        .option.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            font-weight: bold;
        }
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            font-weight: bold;
        }
        .options-list.answered .option:not(.correct):not(.incorrect) {
            opacity: 0.7;
        }
        .options-list.answered .option {
            cursor: default;
            pointer-events: none;
        }
        .quiz-stats {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.95em;
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <a href="biology.html" class="back-link">&larr; Back to Biology</a>
        <h1>Cell Biology (Cytology)</h1>
        <p class="quiz-stats">14 Questions</p>

                answer: 0
            },
            {
                question: "raJ\' Cell wall ke:\'r Vacoules \'tt5f Palastids ) All of these Site of cellular r~piratioE_ -i&::;",
                options: ["Golgibodies", "", "Cells of leaf", "Mitochondria Lysosomes [NDA2014} Cells of stem Cells of flower"],
                answer: 0
            },
            {

                options: ["Protein synthesis", "Processing and packaging _", "Intracellular digestion", "Synthesis of fat"],
                answer: 2
            },
            {

            },
            {
                question: "Whi~e_oLthe follow.iog js smallest..celL?",

            {

            {

                options: ["Exc ange of Cfuomatid segments", "No telophase", "Daughter cells similar to parent cells", "Duplication of chromosomes occurs during anaphase"],
                answer: 2
            }
        ];

        const quizContainer = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.textContent = `${index + 1}) ${item.question}`;
            questionBlock.appendChild(questionText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach((option, optionIndex) => {
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    if (optionsList.classList.contains('answered')) {
                        return;
                    }
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;

                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });

                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            quizContainer.appendChild(questionBlock);
        });
    </script>

    <link rel="stylesheet" href="../pomodoro.css?v=3">

</body>
</html>
