<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sikkim GK Quiz</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0056b3;
        }
        .question-block {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question-text {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .option:hover {
            background-color: #e9ecef;
            border-color: #bbb;
        }
        .option.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            font-weight: bold;
        }
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            font-weight: bold;
        }
        .options-list.answered .option:not(.correct):not(.incorrect) {
            opacity: 0.7;
        }
        .options-list.answered .option {
            cursor: default;
            pointer-events: none; /* Disables further clicks */
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <h1>Sikkim General Knowledge Quiz</h1>
        <!-- Questions will be dynamically inserted here by JavaScript -->
    </div>

    <script>
        const quizData = [
            {
                question: "Who was the Chief Minister of Sikkim at the time of the imposition of President's Rule in 1979?",
                options: ["Nar Bahadur Bhandari", "B.B. Gurung", "Kazi Lhendup Dorji Khangsarpa", "Sanchaman Limboo"],
                answer: 2
            },
            {
                question: "When was the President's Rule imposed for the second time in Sikkim?",
                options: ["15th August 1981", "25th May 1984", "1st January 1983", "12th December 1985"],
                answer: 1
            },
            {
                question: "What was the duration of the second President's Rule in Sikkim?",
                options: ["6 months and 5 days", "1 year and 2 months", "9 months and 11 days", "3 months and 20 days"],
                answer: 2
            },
            {
                question: "Who was the Governor of Sikkim at the time of the imposition of President's Rule in 1984?",
                options: ["Homi J. H. Taleyarkhan", "T.V. Rajeswar", "S.K. Bhatnagar", "Kona Prabhakar Rao"],
                answer: 3
            },
            {
                question: "Who was the Chief Minister of Sikkim when the second President's Rule was imposed in 1984?",
                options: ["Kazi Lhendup Dorji Khangsarpa", "Nar Bahadur Bhandari", "B.B. Gurung", "Pawan Kumar Chamling"],
                answer: 1
            },
            {
                question: "When was the Namgyal Institute of Tibetology established?",
                options: ["1950", "1957", "1962", "1975"],
                answer: 1
            },
            {
                question: "Name the Chogyal who established the Namgyal Institute of Tibetology.",
                options: ["Palden Thondup Namgyal", "Sidkeong Tulku Namgyal", "Tashi Namgyal", "Thutob Namgyal"],
                answer: 2
            },
            {
                question: "When was the publication of the 'Sikkim Herald' started?",
                options: ["1947", "1956", "1965", "1971"],
                answer: 1
            },
            {
                question: "What was the actual name of VC Ganju Lama?",
                options: ["Pema Dorje", "Gyamtso Shangdarpa", "Lobsang Tsering", "Tenzing Norgay"],
                answer: 1
            },
            {
                question: "In which year was Ganju Lama decorated with the Victoria Cross?",
                options: ["1942", "1943", "1944", "1945"],
                answer: 2
            },
            {
                question: "When was the Jetmull & Bhojraj bank established in Sikkim?",
                options: ["1888", "1899", "1911", "1925"],
                answer: 1
            },
            {
                question: "Name the first Sikkimese who was appointed as a Judge of the Sikkim High Court.",
                options: ["Justice Man Mohan Singh Gujral", "Justice A.P. Subba", "Justice Ringim Touden", "Justice Anandmoy Bhattacharjee"],
                answer: 1
            },
            {
                question: "When was the Nathu La trade route reopened?",
                options: ["1st April 2005", "6th July 2006", "15th August 2007", "26th January 2008"],
                answer: 1
            },
            {
                question: "Who is the first Sikkimese to scale Mount Everest?",
                options: ["Sonam Wangyal", "Lt. Sonam Gyatso", "Kunzang Gyatso", "Phurba Tashi Sherpa"],
                answer: 1
            },
            {
                question: "Who is the first Sikkimese woman to scale Mount Everest?",
                options: ["Doma Bhutia", "Nimdoma Sherpa", "Phul Maya Tamang", "Yangdi Sherpa"],
                answer: 2
            },
            {
                question: "Who is the Brand Ambassador of Sikkim?",
                options: ["A.R. Rahman", "Danny Denzongpa", "Bhaichung Bhutia", "Priyanka Chopra"],
                answer: 0
            }
        ];

        const quizContainer = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            // Create the main container for the question
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            // Create and add the question text
            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.textContent = `${index + 1}) ${item.question}`;
            questionBlock.appendChild(questionText);

            // Create the options list
            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';
            
            // Create and add each option
            item.options.forEach((option, optionIndex) => {
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    // Prevent re-answering
                    if (optionsList.classList.contains('answered')) {
                        return;
                    }
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;
                    
                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        // Highlight the correct answer
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });
                
                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            quizContainer.appendChild(questionBlock);
        });

    </script>
</body>
</html>
