                topic: "Topic 8: Stalinism and Collectivisation"
            },

            // Topic 9: Global Influence and Miscellaneous
            {
                question: "What was the Comintern?",
                options: ["The Russian Parliament", "An international union of pro-Bolshevik socialist parties", "The secret police", "The new name for the Russian Empire"],
                answer: 1,
                explanation: "The Comintern was an international union of pro-Bolshevik socialist parties.",
                topic: "Topic 9: Global Influence and Miscellaneous"
            },
            {
                question: "Which famous Indian writer wrote about Soviet Socialism after visiting Russia?",
                options: ["Mahatma Gandhi", "Rabindranath Tagore", "Subhash Chandra Bose", "Sardar Patel"],
                answer: 1,
                explanation: "Rabindranath Tagore wrote about Soviet Socialism after visiting Russia.",
                topic: "Topic 9: Global Influence and Miscellaneous"
            },
            {
                question: "What is the definition of 'Real Wage'?",
                options: ["The money paid in cash", "The wage adjusted for inflation", "Reflects the quantities of goods which the wages will actually buy", "The total income of a family"],
                answer: 2,
                explanation: "Real Wage reflects the quantities of goods which the wages will actually buy.",
                topic: "Topic 9: Global Influence and Miscellaneous"
            },
            {
                question: "What does the term 'Deported' mean in the context of Stalin's Russia?",
                options: ["Promoted to a higher rank", "Forcibly removed from one’s own country", "Sent to school", "Given a new piece of land"],
                answer: 1,
                explanation: "Deported means forcibly removed from one’s own country.",
                topic: "Topic 9: Global Influence and Miscellaneous"
            },
            {
                question: "By the 1950s, what was the global realization about the USSR?",
                options: ["That it was a perfect democracy", "That the style of government was not in keeping with the ideals of the Russian Revolution", "That it had failed to industrialize", "That it was still a monarchy"],
                answer: 1,
                explanation: "The global realization was that the style of government was not in keeping with the ideals of the Russian Revolution.",
                topic: "Topic 9: Global Influence and Miscellaneous"
            }
        ];

        // DOM elements
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackDiv = document.getElementById('feedback');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const currentQuestionSpan = document.getElementById('current-question');
        const totalQuestionsSpan = document.getElementById('total-questions');
        const currentScoreSpan = document.getElementById('current-score');
        const progressBar = document.getElementById('progress-bar');
        const resultContainer = document.getElementById('result-container');
        const finalScoreSpan = document.getElementById('final-score');
        const totalQuestionsFinalSpan = document.getElementById('total-questions-final');
        const performanceText = document.getElementById('performance-text');
        const restartBtn = document.getElementById('restart-btn');
        const weekIndicator = document.getElementById('week-indicator');

        // Quiz state
        let currentQuestionIndex = 0;
        let userAnswers = Array(quizData.length).fill(null);
        let score = 0;

        // Initialize quiz
        function initQuiz() {
            totalQuestionsSpan.textContent = quizData.length;
            totalQuestionsFinalSpan.textContent = quizData.length; // Also set for result screen
            updateProgressBar();
            showQuestion();
        }

        // Show current question
        function showQuestion() {
            const question = quizData[currentQuestionIndex];
            questionText.innerHTML = question.question; 
            weekIndicator.textContent = question.topic;
            
            optionsContainer.innerHTML = '';
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = option;
                optionDiv.addEventListener('click', () => selectOption(index));
                optionsContainer.appendChild(optionDiv);
            });
            
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? 'Finish' : 'Next';
            
            currentQuestionSpan.textContent = currentQuestionIndex + 1;
            currentScoreSpan.textContent = score;
            updateProgressBar();
            
            feedbackDiv.style.display = 'none';
            
            if (userAnswers[currentQuestionIndex] !== null) {
                const selectedOptIndex = userAnswers[currentQuestionIndex];
                const options = optionsContainer.querySelectorAll('.option');
                if (options[selectedOptIndex]) { 
                    options[selectedOptIndex].classList.add('selected');
                }
                checkAnswer(selectedOptIndex, false); 
            } else {
                optionsContainer.querySelectorAll('.option').forEach(opt => {
                    opt.style.pointerEvents = 'auto';
                });
            }
        }

        function updateProgressBar() {
            const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function selectOption(optionIndex) {
            if (feedbackDiv.style.display === 'block' && questionText.innerHTML === quizData[currentQuestionIndex].question) { 
                return; 
            }

            const isFirstAttemptForThisQuestionIndex = userAnswers[currentQuestionIndex] === null;
            
            if (isFirstAttemptForThisQuestionIndex) {
                userAnswers[currentQuestionIndex] = optionIndex;
            }
            
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            if (options[optionIndex]) {
                options[optionIndex].classList.add('selected');
            }
            
            checkAnswer(optionIndex, isFirstAttemptForThisQuestionIndex);
        }

        function checkAnswer(selectedIndex, isFirstScoringAttempt) {
            const question = quizData[currentQuestionIndex];
            const options = document.querySelectorAll('.option');
            
            options.forEach(opt => {
                opt.style.pointerEvents = 'none'; 
            });

            if (options[question.answer]) {
                 options[question.answer].classList.add('correct');
            }
            if (selectedIndex !== question.answer && options[selectedIndex]) {
                options[selectedIndex].classList.add('incorrect');
            }
            
            feedbackDiv.innerHTML = ''; 
            if (selectedIndex === question.answer) {
                feedbackDiv.className = 'feedback correct-feedback';
                feedbackDiv.textContent = 'Correct!';
                if (isFirstScoringAttempt) { 
                    score++;
                }
            } else {
                feedbackDiv.className = 'feedback incorrect-feedback';
                const correctAnswerText = question.options[question.answer] || "N/A";
                feedbackDiv.textContent = `Incorrect. The correct answer is: ${correctAnswerText}`;
            }
            currentScoreSpan.textContent = score;
            
            if (question.explanation) {
                const explanation = document.createElement('div');
                explanation.className = 'explanation';
                explanation.textContent = question.explanation;
                feedbackDiv.appendChild(explanation);
            }
            
            feedbackDiv.style.display = 'block';
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        function showResult() {
            document.querySelector('.quiz-container').style.display = 'none';
            document.querySelector('.progress-text').style.display = 'none';
            document.querySelector('.progress-container').style.display = 'none';
            resultContainer.style.display = 'block';
            finalScoreSpan.textContent = score;
            
            const percentage = (score / quizData.length) * 100;
            let performance = '';
            if (percentage >= 90) {
                performance = 'Outstanding! You have an excellent knowledge of History.';
            } else if (percentage >= 75) {
                performance = 'Excellent! You are very well-informed about the Russian Revolution.';
            } else if (percentage >= 50) {
                performance = 'Good effort! You know quite a bit about this topic.';
            } else if (percentage >= 30) {
                performance = 'Keep learning! Review the topics to improve.';
            } else {
                performance = 'A good start! Study more to enhance your knowledge of History.';
            }
            performanceText.textContent = performance;
            // --- Firebase Progress Tracking ---
            (function() {
                var quizTitle = document.title || 'Unknown Quiz';
                var category = 'General';
                var path = window.location.pathname;
                if (path.indexOf('Sikkim Current Affairs') !== -1 || quizTitle.indexOf('Sikkim') !== -1) category = 'Sikkim Current Affairs';
                else if (path.indexOf('National International') !== -1 || quizTitle.indexOf('National') !== -1) category = 'National/International CA';
                else if (path.indexOf('Physics') !== -1 || quizTitle.indexOf('Physics') !== -1) category = 'Physics';
                else if (path.indexOf('Polity') !== -1) category = 'Polity';
                else if (path.indexOf('History') !== -1) category = 'History';
                else if (path.indexOf('Economics') !== -1) category = 'Economics';
                else if (path.indexOf('Geography') !== -1) category = 'Geography';
                if (typeof saveQuizResult === 'function' && typeof isLoggedIn === 'function' && isLoggedIn()) {
                    saveQuizResult(quizTitle, score, quizData.length, category);
                }
            })();
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            userAnswers = Array(quizData.length).fill(null);
            score = 0;
            document.querySelector('.quiz-container').style.display = 'block';
            document.querySelector('.progress-text').style.display = 'flex'; 
            document.querySelector('.progress-container').style.display = 'block'; 
            resultContainer.style.display = 'none';
            feedbackDiv.style.display = 'none';
            currentScoreSpan.textContent = score; 
            showQuestion();
        }

        nextBtn.addEventListener('click', nextQuestion);
        prevBtn.addEventListener('click', prevQuestion);
        restartBtn.addEventListener('click', restartQuiz);

        initQuiz();
    </script>
