        const totalQuestionsFinalSpan = document.getElementById('total-questions-final');
        const performanceText = document.getElementById('performance-text');
        const restartBtn = document.getElementById('restart-btn');
        const sectionIndicator = document.getElementById('section-indicator');

        // Quiz state
        let currentQuestionIndex = 0;
        let userAnswers = Array(quizData.length).fill(null);
        let score = 0;

        function initQuiz() {
            totalQuestionsSpan.textContent = quizData.length;
            totalQuestionsFinalSpan.textContent = quizData.length;
            updateProgressBar();
            showQuestion();
        }

        function showQuestion() {
            const q = quizData[currentQuestionIndex];
            questionText.textContent = q.question;
            sectionIndicator.textContent = q.section;
            
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = opt;
                div.addEventListener('click', () => selectOption(i));
                optionsContainer.appendChild(div);
            });
            
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? 'Finish' : 'Next';
            
            currentQuestionSpan.textContent = currentQuestionIndex + 1;
            currentScoreSpan.textContent = score;
            updateProgressBar();
            
            feedbackDiv.style.display = 'none';
            
            if (userAnswers[currentQuestionIndex] !== null) {
                const sel = userAnswers[currentQuestionIndex];
                const opts = optionsContainer.querySelectorAll('.option');
                if (opts[sel]) opts[sel].classList.add('selected');
                checkAnswer(sel, false);
            }
        }

        function updateProgressBar() {
            const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function selectOption(idx) {
            if (feedbackDiv.style.display === 'block') return;

            const firstAttempt = userAnswers[currentQuestionIndex] === null;
            if (firstAttempt) {
                userAnswers[currentQuestionIndex] = idx;
            }

            const opts = optionsContainer.querySelectorAll('.option');
            opts.forEach(o => o.classList.remove('selected'));
            if (opts[idx]) opts[idx].classList.add('selected');

            checkAnswer(idx, firstAttempt);
        }

        function checkAnswer(selectedIdx, shouldScore) {
            const q = quizData[currentQuestionIndex];
            const opts = optionsContainer.querySelectorAll('.option');
            opts.forEach(o => o.style.pointerEvents = 'none');

            if (opts[q.answer]) opts[q.answer].classList.add('correct');
            if (selectedIdx !== q.answer && opts[selectedIdx]) {
                opts[selectedIdx].classList.add('incorrect');
            }

            feedbackDiv.innerHTML = '';
            if (selectedIdx === q.answer) {
                feedbackDiv.className = 'feedback correct-feedback';
                feedbackDiv.textContent = 'Correct!';
                if (shouldScore) score++;
            } else {
                feedbackDiv.className = 'feedback incorrect-feedback';
                const correctText = q.options[q.answer] || "N/A";
                feedbackDiv.textContent = `Incorrect. The correct answer is: ${correctText}`;
            }

            currentScoreSpan.textContent = score;

            if (q.explanation) {
                const exp = document.createElement('div');
                exp.className = 'explanation';
                exp.textContent = q.explanation;
                feedbackDiv.appendChild(exp);
            }

            feedbackDiv.style.display = 'block';
        }

        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        function showResult() {
            document.querySelector('.quiz-container').style.display = 'none';
            document.querySelector('.progress-text').style.display = 'none';
            document.querySelector('.progress-container').style.display = 'none';
            resultContainer.style.display = 'block';

            finalScoreSpan.textContent = score;
            const pct = (score / quizData.length) * 100;
            let msg = '';
            if (pct >= 90) msg = 'Outstanding! Exceptional understanding of the topic.';
            else if (pct >= 75) msg = 'Excellent! Very strong grasp of the material.';
            else if (pct >= 60) msg = 'Good effort! Solid knowledge base.';
            else if (pct >= 40) msg = 'Fair. Room to improve with review.';
            else msg = 'Needs more study. Keep learning!';
            performanceText.textContent = msg;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            userAnswers = Array(quizData.length).fill(null);
            score = 0;
            document.querySelector('.quiz-container').style.display = 'block';
            document.querySelector('.progress-text').style.display = 'flex';
            document.querySelector('.progress-container').style.display = 'block';
            resultContainer.style.display = 'none';
            feedbackDiv.style.display = 'none';
            currentScoreSpan.textContent = score;
            showQuestion();
        }

        nextBtn.addEventListener('click', nextQuestion);
        prevBtn.addEventListener('click', prevQuestion);
        restartBtn.addEventListener('click', restartQuiz);

        initQuiz();
    </script>
