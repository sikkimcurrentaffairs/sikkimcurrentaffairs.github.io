<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrophysics & Space Science | Sikkim PSC Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .quiz-container {
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        html.dark .quiz-container {
            background: #24272c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #0284c7;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .question-block {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f1f5f9;
        }
        html.dark .question-block {
            border-bottom: 1px solid #334155;
        }
        .question-text {
            font-size: 1.15em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1e293b;
        }
        html.dark .question-text {
            color: #f1f5f9;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 16px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            color: #475569;
        }
        html.dark .option {
            background-color: #1e293b;
            border: 2px solid #334155;
            color: #cbd5e1;
        }
        .option:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
            transform: translateX(4px);
        }
        html.dark .option:hover {
            background-color: #334155;
            border-color: #475569;
        }
        .option.correct {
            background-color: #dcfce7 !important;
            border-color: #4ade80 !important;
            color: #166534 !important;
        }
        html.dark .option.correct {
            background-color: #064e3b !important;
            border-color: #10b981 !important;
            color: #ecfdf5 !important;
        }
        .option.incorrect {
            background-color: #fee2e2 !important;
            border-color: #f87171 !important;
            color: #991b1b !important;
        }
        html.dark .option.incorrect {
            background-color: #7f1d1d !important;
            border-color: #ef4444 !important;
            color: #fef2f2 !important;
        }
        .options-list.answered {
            pointer-events: none;
        }
        .quiz-stats-badge {
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }
        html.dark .quiz-stats-badge {
            background: #334155;
            color: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen p-4 sm:p-8">

    <div class="quiz-container">
        <a href="physics.html" class="back-link">&larr; Back to Physics Topics</a>
        <h1 class="text-3xl font-bold text-blue-800 dark:text-blue-400 mb-2">Astrophysics & Space Science</h1>
        <div class="quiz-stats-badge">19 MCQ Questions</div>
        
        <div id="questions-wrapper"></div>
    </div>

    <script>
        const quizData = [
            {
                question: "Stars which appear single to the naked eye but are double when seen through a telescope are",
                options: ["novas and supernovas", "binaries", "asteroids", "quasars"],
                answer: 1
            },
            {
                question: "Solar eclipse will take place when",
                options: ["the sun is between the moon and the earth", "the earth is between the moon and the sun", "the moon is between the sun and the earth", "the moon does not lie on the line joining the sun and the earth"],
                answer: 2
            },
            {
                question: "It is dangerous to observe Solar eclipse with naked eyes because",
                options: ["Infrared radiations from sun burn our retina", "Ultraviolet radiations from Sun burn our retina", "All radiations from sun initiate chemical reactions in eyes", "Cosmic rays reach eyes more during the eclipse"],
                answer: 1
            },
            {
                question: "The shape of our milky way galaxy is",
                options: ["Circular", "Elliptical", "Spiral", "None of the above"],
                answer: 2
            },
            {
                question: "The cover of a solar cooker is made of glass because",
                options: ["It absorbs sun's rays", "It reflects sun's rays", "It retains the heat inside by the green house effect", "It rediates heat better than metals"],
                answer: 2
            },
            {
                question: "A star appears twinkling in the sky because of",
                options: ["Scattering of light by atmosphere", "Reflection of light by atmosphere", "Refraction of light by atmosphere", "Diffraction of light by atmosphere"],
                answer: 2
            },
            {
                question: "The group of solar cells joined together in a definite pattern is called a",
                options: ["Battery", "Solar heater", "Solar cooker", "Solar cell panel"],
                answer: 3
            },
            {
                question: "The spoon dropped by an astronaut in a satellite will",
                options: ["Fall to the floor", "Remain stationary", "Continue to follow the motion of the satellite", "Move tangentially away"],
                answer: 2
            },
            {
                question: "The mass of a star is two times the mass of the Sun. How it will come to an end ?",
                options: ["Neutron Star", "Black hole", "White Dwarf", "Red Giant"],
                answer: 0
            },
            {
                question: "The period of revolution of a certain planet in an orbit of radius R is T. Its period of revolution in an orbit of radius 4R will be:",
                options: ["8 T", "4 T", "1 T", "2 T"],
                answer: 0
            },
            {
                question: "Which of the following is indicated by the colour of a star ?",
                options: ["Weight", "Distance", "Temperature", "Size"],
                answer: 2
            },
            {
                question: "The period of revolution of a geostationary satellite is",
                options: ["365 days", "30 days", "24 hours", "Changing continuously"],
                answer: 2
            },
            {
                question: "The height of a geo-stationary satellite from the Earth's surface is approximately :",
                options: ["36,000 km", "42,000 km", "30,000 km", "None of these"],
                answer: 0
            },
            {
                question: "Why is weightlessness experienced while orbiting the earth in space ships ?",
                options: ["Inertia", "Acceleration", "Zero gravity", "None of these"],
                answer: 3
            },
            {
                question: "The sensation of weightlessness in a spacecraft in an orbit is due to the",
                options: ["Absence of gravity outside", "Acceleration in the orbit which is equal to the acceleration due to gravity outside", "Presence of gravity outside but not inside the spacecraft", "Fact that spacecraft in the orbit has no energy"],
                answer: 1
            },
            {
                question: "Who among the following is credited for the discovery of ''Expanding Universe\"?",
                options: ["Edwin Hubble", "Niels Bohr", "S Chandra Shekhar", "C.V Raman"],
                answer: 0
            },
            {
                question: "Who gave black hole theory?",
                options: ["Albert Einstein", "Stephen Hawking", "Isaac Newton", "None of the above"],
                answer: 1
            },
            {
                question: "Which of the following parts of the sunlight makes the solar cooker hot ?",
                options: ["Ultra violet", "Red light", "Infra red", "Cosmic rays"],
                answer: 2
            },
            {
                question: "One can distinguish a telescope from a microscope by observing",
                options: ["Length", "Colour", "Size of the lens", "Length and size of the lens"],
                answer: 3
            }
        ];

        const wrapper = document.getElementById('questions-wrapper');

        quizData.forEach((item, index) => {
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.innerHTML = `<span class="text-blue-600 dark:text-blue-500 mr-2">Q${index + 1}.</span> ${item.question}`;
            questionBlock.appendChild(questionText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach((option, optionIndex) => {
                if (!option || option.trim() === '') return;
                
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    if (optionsList.classList.contains('answered')) return;
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;

                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });

                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            wrapper.appendChild(questionBlock);
        });

        // Theme sync
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <link rel="stylesheet" href="../pomodoro.css?v=3">
    <script src="../pomodoro.js?v=3"></script>
</body>
</html>
