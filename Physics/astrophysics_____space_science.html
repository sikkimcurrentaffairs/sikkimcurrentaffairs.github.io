<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrophysics & Space Science - Physics Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .neomorphism {
            background: #f0f0f0;
            box-shadow: 8px 8px 16px #d1d1d1, -8px -8px 16px #ffffff;
        }
        .dark .neomorphism {
            background: #1f2937;
            box-shadow: 8px 8px 16px #111827, -8px -8px 16px #2d3748;
        }
        .option-btn {
            transition: all 0.2s ease;
        }
        .option-btn:hover {
            transform: translateY(-2px);
        }
    </style>
    <link rel="stylesheet" href="../auth.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen py-8 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="mb-6 flex justify-between items-center">
            <a href="physics.html" class="text-indigo-600 dark:text-indigo-400 font-medium">&larr; Back to Physics</a>
            <div id="progress" class="text-gray-500 font-medium">Question 1/0</div>
        </div>

        <div class="neomorphism rounded-2xl p-8 mb-8">
            <h1 class="text-3xl font-bold text-gray-800 dark:text-white mb-6">Astrophysics & Space Science</h1>
            <div id="quiz-container">
                <div id="question-text" class="text-xl text-gray-700 dark:text-gray-300 mb-8 font-medium"></div>
                <div id="options-container" class="grid grid-cols-1 gap-4"></div>
            </div>
            <div id="result-container" class="hidden text-center py-10">
                <h2 class="text-4xl font-bold text-gray-800 dark:text-white mb-4">Quiz Completed!</h2>
                <p id="score-text" class="text-2xl text-gray-600 dark:text-gray-400 mb-8"></p>
                <button onclick="location.reload()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors">Restart Quiz</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "Stars which appear single to the naked eye but are double when seen through a telescope are",
                options: ["novas and supernovas", "binaries", "asteroids", "quasars"],
                answer: 1
            },
            {
                question: "Solar eclipse will take place when",
                options: ["the sun is between the moon and the earth", "the earth is between the moon and the sun", "the moon is between the sun and the earth", "the moon does not lie on the line joining the sun and the earth"],
                answer: 2
            },
            {
                question: "It is dangerous to observe Solar eclipse with naked eyes because",
                options: ["Infrared radiations from sun burn our retina", "Ultraviolet radiations from Sun burn our retina", "All radiations from sun initiate chemical reactions in eyes", "Cosmic rays reach eyes more during the eclipse"],
                answer: 1
            },
            {
                question: "The shape of our milky way galaxy is",
                options: ["Circular", "Elliptical", "Spiral", "None of the above"],
                answer: 2
            },
            {
                question: "The cover of a solar cooker is made of glass because",
                options: ["It absorbs sun's rays", "It reflects sun's rays", "It retains the heat inside by the green house effect", "It rediates heat better than metals"],
                answer: 2
            },
            {
                question: "A star appears twinkling in the sky because of",
                options: ["Scattering of light by atmosphere", "Reflection of light by atmosphere", "Refraction of light by atmosphere", "Diffraction of light by atmosphere"],
                answer: 2
            },
            {
                question: "The group of solar cells joined together in a definite pattern is called a",
                options: ["Battery", "Solar heater", "Solar cooker", "Solar cell panel"],
                answer: 3
            },
            {
                question: "The spoon dropped by an astronaut in a satellite will",
                options: ["Fall to the floor", "Remain stationary", "Continue to follow the motion of the satellite", "Move tangentially away"],
                answer: 2
            },
            {
                question: "The mass of a star is two times the mass of the Sun. How it will come to an end ?",
                options: ["Neutron Star", "Black hole", "White Dwarf", "Red Giant"],
                answer: 0
            },
            {
                question: "The period of revolution of a certain planet in an orbit of radius R is T. Its period of revolution in an orbit of radius 4R will be:",
                options: ["8 T", "4 T", "1 T", "2 T"],
                answer: 0
            },
            {
                question: "Which of the following is indicated by the colour of a star ?",
                options: ["Weight", "Distance", "Temperature", "Size"],
                answer: 2
            },
            {
                question: "The period of revolution of a geostationary satellite is",
                options: ["365 days", "30 days", "24 hours", "Changing continuously"],
                answer: 2
            },
            {
                question: "The height of a geo-stationary satellite from the Earth's surface is approximately :",
                options: ["36,000 km", "42,000 km", "30,000 km", "None of these"],
                answer: 0
            },
            {
                question: "Why is weightlessness experienced while orbiting the earth in space ships ?",
                options: ["Inertia", "Acceleration", "Zero gravity", "None of these"],
                answer: 3
            },
            {
                question: "The sensation of weightlessness in a spacecraft in an orbit is due to the",
                options: ["Absence of gravity outside", "Acceleration in the orbit which is equal to the acceleration due to gravity outside", "Presence of gravity outside but not inside the spacecraft", "Fact that spacecraft in the orbit has no energy"],
                answer: 1
            },
            {
                question: "Who among the following is credited for the discovery of ''Expanding Universe\"?",
                options: ["Edwin Hubble", "Niels Bohr", "S Chandra Shekhar", "C.V Raman"],
                answer: 0
            },
            {
                question: "Who gave black hole theory?",
                options: ["Albert Einstein", "Stephen Hawking", "Isaac Newton", "None of the above"],
                answer: 1
            },
            {
                question: "Which of the following parts of the sunlight makes the solar cooker hot ?",
                options: ["Ultra violet", "Red light", "Infra red", "Cosmic rays"],
                answer: 2
            },
            {
                question: "One can distinguish a telescope from a microscope by observing",
                options: ["Length", "Colour", "Size of the lens", "Length and size of the lens"],
                answer: 3
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const progressText = document.getElementById('progress');
        const quizContainer = document.getElementById('quiz-container');
        const resultContainer = document.getElementById('result-container');
        const scoreText = document.getElementById('score-text');

        function loadQuestion() {
            const q = quizData[currentQuestion];
            questionText.textContent = (currentQuestion + 1) + ". " + q.question;
            progressText.textContent = `Question ${currentQuestion + 1}/${quizData.length}`;
            
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn neomorphism w-full text-left p-4 rounded-xl border-2 border-transparent hover:border-indigo-500 dark:text-gray-300';
                btn.innerHTML = `<span class="font-bold mr-3">${String.fromCharCode(65 + idx)}.</span> ${opt}`;
                btn.onclick = () => selectOption(idx);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(idx) {
            const correct = quizData[currentQuestion].answer;
            const buttons = optionsContainer.getElementsByTagName('button');
            
            for(let i=0; i<buttons.length; i++) {
                buttons[i].disabled = true;
                if(i === correct) {
                    buttons[i].classList.add('bg-green-100', 'dark:bg-green-900/30', 'border-green-500');
                } else if(i === idx) {
                    buttons[i].classList.add('bg-red-100', 'dark:bg-red-900/30', 'border-red-500');
                }
            }

            if(idx === correct) score++;

            setTimeout(() => {
                currentQuestion++;
                if(currentQuestion < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1500);
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultContainer.classList.remove('hidden');
            scoreText.textContent = `You scored ${score} out of ${quizData.length}`;
            // --- Firebase Progress Tracking ---
            (function() {
                var quizTitle = document.title || 'Unknown Quiz';
                var category = 'General';
                var path = window.location.pathname;
                if (path.indexOf('Sikkim Current Affairs') !== -1 || quizTitle.indexOf('Sikkim') !== -1) category = 'Sikkim Current Affairs';
                else if (path.indexOf('National International') !== -1 || quizTitle.indexOf('National') !== -1) category = 'National/International CA';
                else if (path.indexOf('Physics') !== -1 || quizTitle.indexOf('Physics') !== -1) category = 'Physics';
                else if (path.indexOf('Polity') !== -1) category = 'Polity';
                else if (path.indexOf('History') !== -1) category = 'History';
                else if (path.indexOf('Economics') !== -1) category = 'Economics';
                else if (path.indexOf('Geography') !== -1) category = 'Geography';
                if (typeof saveQuizResult === 'function' && typeof isLoggedIn === 'function' && isLoggedIn()) {
                    saveQuizResult(quizTitle, score, quizData.length, category);
                }
            })();
        }

        if(quizData.length > 0) loadQuestion();
    </script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="../auth.js"></script>

    <link rel="stylesheet" href="../pomodoro.css?v=3">
    <script src="../pomodoro.js?v=3"></script>
</body>
</html>
