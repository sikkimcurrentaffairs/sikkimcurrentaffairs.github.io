                question: "The force between charged particles is called as:",
                options: ["Nuclear Force", "Gravitational Force", "Centrifugal Force", "Electromagnetic Force"],
                answer: 3
            },
            {
                question: "Energy stored in the nucleus of an atom is called",
                options: ["Nuclear energy", "Atomic energy", "Potential energy", "Kinetic energy"],
                answer: 0
            },
            {
                question: "The radiant energy having lowest energy is",
                options: ["Gamma rays", "UV rays", "Visible light", "Microwave radiation"],
                answer: 3
            },
            {
                question: "The least penetrating power ray is",
                options: ["Gamma rays", "Beta rays", "Alpha rays", "None of the above"],
                answer: 2
            },
            {
                question: "The energy obtained from atoms is known as ________",
                options: ["Solar energy", "Heat energy", "Nuclear energy", "Chemical energy"],
                answer: 2
            },
            {
                question: "What is the range of Strong Nuclear force?",
                options: ["Infinite", "Very short Subnuclear size", "Very short Nuclear size", "None"],
                answer: 2
            },
            {
                question: "Name the process of production of energy in the Sun",
                options: ["Nuclear fission", "Radioactivity", "Nuclear fusion", "Ionization"],
                answer: 2
            },
            {
                question: "Energy is continuously created in the sun due to:",
                options: ["Nuclear fusion", "Nuclear fission", "Radioactivity", "Artificial radioactivity"],
                answer: 0
            },
            {
                question: "The magnifying power of an astronomical telescope can be decreased by",
                options: ["Decreasing the focal length of the eyepiece", "Increasing the focal length of the eyepiece", "Increasing the focal length of the objective", "None of these"],
                answer: 1
            },
            {
                question: "Find the power of a convex lens if the image formed is at a distance of 25 cm from the lens when the object is placed on the other side of the lens at 12 cm from the optical centre?",
                options: ["-4.33 diopters", "12.33 diopters", "-12.33 diopters", "4.33 diopters"],
                answer: 1
            },
            {
                question: "Find the power of a convex lens if the image formed is at a distance of 16 cm from the lens when the object is placed on the other side of the lens at 20 cm from the optical centre?",
                options: ["-3.75 diopters", "-11.25 diopters", "3.75 diopters", "11.25 diopters"],
                answer: 3
            },
            {
                question: "Fibre optics work on the principle of",
                options: ["Scattering of light", "Total internal absorption", "Total internal reflection", "Optical rotation"],
                answer: 2
            }
        ];

        const wrapper = document.getElementById('questions-wrapper');

        quizData.forEach((item, index) => {
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.innerHTML = `<span class="text-blue-600 dark:text-blue-500 mr-2">Q${index + 1}.</span> ${item.question}`;
            questionBlock.appendChild(questionText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach((option, optionIndex) => {
                if (!option || option.trim() === '') return;
                
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    if (optionsList.classList.contains('answered')) return;
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;

                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });

                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            wrapper.appendChild(questionBlock);
        });

        // Theme sync
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
