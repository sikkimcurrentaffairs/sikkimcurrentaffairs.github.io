<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sikkim GK Quiz</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0056b3;
        }
        .question-block {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question-text {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .option:hover {
            background-color: #e9ecef;
            border-color: #bbb;
        }
        .option.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            font-weight: bold;
        }
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            font-weight: bold;
        }
        .options-list.answered .option:not(.correct):not(.incorrect) {
            opacity: 0.7;
        }
        .options-list.answered .option {
            cursor: default;
            pointer-events: none; /* Disables further clicks */
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <h1>Sikkim General Knowledge Quiz</h1>
        <!-- Questions will be dynamically inserted here by JavaScript -->
    </div>

    <script>
        const quizData = [
            {
                question: "What is the meaning of \"Sikkim\"?",
                options: ["The high hill", "Valley of rice", "New house/place", "Great snowy mountain of five treasure"],
                answer: 2
            },
            {
                question: "\"The high hill\" is the meaning of which place?",
                options: ["Sikkim", "Gangtok", "Denjong", "Khanchengdzonga"],
                answer: 1
            },
            {
                question: "What does \"Denjong\" mean?",
                options: ["Pass of listening ear", "Easy pass", "Valley of rice", "Big pass"],
                answer: 2
            },
            {
                question: "The meaning of \"Khanchengdzonga\" is:",
                options: ["Little pass", "Meeting place of three superiors", "Great snowy mountain of five treasure", "The height of chief residence"],
                answer: 2
            },
            {
                question: "\"Pass of listening ear\" is the meaning of:",
                options: ["Jelepla", "Lachen", "Nathula", "Lachung"],
                answer: 2
            },
            {
                question: "What is the meaning of \"Jelepla\"?",
                options: ["Principal pass", "Easy pass", "Black hill", "The retreat"],
                answer: 1
            },
            {
                question: "\"Lachen\" means:",
                options: ["The sublime perfect lotus", "Big pass", "The island od esoteric teaching", "Our diety has left"],
                answer: 1
            },
            {
                question: "What is the meaning of \"Lachung\"?",
                options: ["The sky top", "Little pass", "The high quite place", "The ridge of fortune"],
                answer: 1
            },
            {
                question: "\"Meeting place of three superiors\" is the meaning of which place?",
                options: ["Rabdenste", "Chola", "Yoksam", "Rhenock"],
                answer: 2
            },
            {
                question: "What does \"Rabdenste\" mean?",
                options: ["The upraised horn", "The auspicious place", "The height of chief residence", "Lake of the goddess"],
                answer: 2
            },
            {
                question: "The meaning of \"Chola\" is:",
                options: ["Disappearing sister", "Blossomed crowned hill-top", "Principal pass", "New house/place"],
                answer: 2
            },
            {
                question: "\"Black hill\" is the meaning of:",
                options: ["Dubdi", "Pemayangste", "Rhenock", "Sanga Cholling"],
                answer: 2
            },
            {
                question: "What is the meaning of \"Dubdi\"?",
                options: ["The high hill", "The retreat", "Valley of rice", "Great snowy mountain of five treasure"],
                answer: 1
            },
            {
                question: "\"Pemayangste\" means:",
                options: ["Pass of listening ear", "Easy pass", "The sublime perfect lotus", "Big pass"],
                answer: 2
            },
            {
                question: "What is the meaning of \"Sanga Cholling\"?",
                options: ["Little pass", "Meeting place of three superiors", "The island od esoteric teaching", "The height of chief residence"],
                answer: 2
            },
            {
                question: "\"Our diety has left\" is the meaning of which place?",
                options: ["Namchi", "Enchey", "Rumtek", "Yangang"],
                answer: 1
            },
            {
                question: "What does \"Namchi\" mean?",
                options: ["Principal pass", "Black hill", "The sky top", "The retreat"],
                answer: 2
            },
            {
                question: "The meaning of \"Enchey\" is:",
                options: ["The sublime perfect lotus", "The island od esoteric teaching", "The high quite place", "Our diety has left"],
                answer: 2
            },
            {
                question: "\"The ridge of fortune\" is the meaning of:",
                options: ["Tendong", "Tashiding", "Yangang", "Cholamu"],
                answer: 2
            },
            {
                question: "What is the meaning of \"Tendong\"?",
                options: ["The sky top", "The high quite place", "The upraised horn", "The ridge of fortune"],
                answer: 2
            },
            {
                question: "\"Tashiding\" means:",
                options: ["Lake of the goddess", "Disappearing sister", "The auspicious place", "Blossomed crowned hill-top"],
                answer: 2
            },
            {
                question: "What is the meaning of \"Cholamu\"?",
                options: ["New house/place", "The high hill", "Lake of the goddess", "Valley of rice"],
                answer: 2
            },
            {
                question: "\"Disappearing sister\" is the meaning of which place?",
                options: ["Mintogang", "Maenam", "Sikkim", "Gangtok"],
                answer: 1
            },
            {
                question: "What does \"Mintogang\" mean?",
                options: ["Great snowy mountain of five treasure", "Pass of listening ear", "Blossomed crowned hill-top", "Easy pass"],
                answer: 2
            }
        ];

        const quizContainer = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            // Create the main container for the question
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            // Create and add the question text
            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.textContent = `${index + 1}) ${item.question}`;
            questionBlock.appendChild(questionText);

            // Create the options list
            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';
            
            // Create and add each option
            item.options.forEach((option, optionIndex) => {
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    // Prevent re-answering
                    if (optionsList.classList.contains('answered')) {
                        return;
                    }
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;
                    
                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        // Highlight the correct answer
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });
                
                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            quizContainer.appendChild(questionBlock);
        });

    </script>
</body>
</html>
