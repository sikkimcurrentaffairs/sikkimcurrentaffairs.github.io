<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sikkim GK Quiz</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        #quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #0056b3;
        }
        .question-block {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .question-text {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, border-color 0.3s;
        }
        .option:hover {
            background-color: #e9ecef;
            border-color: #bbb;
        }
        .option.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            font-weight: bold;
        }
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            font-weight: bold;
        }
        .options-list.answered .option:not(.correct):not(.incorrect) {
            opacity: 0.7;
        }
        .options-list.answered .option {
            cursor: default;
            pointer-events: none; /* Disables further clicks */
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <h1>Sikkim General Knowledge Quiz</h1>
        <!-- Questions will be dynamically inserted here by JavaScript -->
    </div>

    <script>
        const quizData = [
            {
                question: "The establishment of more bank branches in Sikkim was further boosted by the opening of the Nathula trade in which year?",
                options: ["1968", "1978", "2006", "2002"],
                answer: 2
            },
            {
                question: "The State Bank of Sikkim (SBS) was established by a Royal Proclamation in which year?",
                options: ["1965", "1968", "1975", "2006"],
                answer: 1
            },
            {
                question: "According to the document, how many branches does the State Bank of Sikkim (SBS) have across the state?",
                options: ["30", "Less than 30", "Exactly 33", "More than 33"],
                answer: 3
            },
            {
                question: "Which of the following are mentioned as two other local banks in Sikkim besides the State Bank of Sikkim?",
                options: ["Axis Bank and HDFC Bank", "Central Bank of India and Union Bank of India", "The Citizen's Cooperative Bank and SISCO Bank Ltd", "State Bank of India and Punjab National Bank"],
                answer: 2
            },
            {
                question: "How many daily newspapers are currently published in Sikkim, according to the document?",
                options: ["20", "50", "74", "44"],
                answer: 2
            },
            {
                question: "When was the Press Club of Sikkim constituted by the State Government?",
                options: ["24th June 1968", "17th July 2002", "12th October 2005", "22nd November 2002"],
                answer: 1
            },
            {
                question: "Which newspaper is published daily by the IPR Government of Sikkim in English and 11 state languages?",
                options: ["Sikkim Express", "Hamro Prajashakti", "Sikkim Herald", "Samay Dainik"],
                answer: 2
            },
            {
                question: "The provision for a State Public Service Commission for each state is under which Article of the Constitution of India?",
                options: ["Article 356", "Article 355", "Article 324", "Article 315"],
                answer: 3
            },
            {
                question: "In what year was the Public Service Commission for the state of Sikkim created?",
                options: ["1968", "1978", "1982", "2001"],
                answer: 1
            },
            {
                question: "Although created earlier, the Public Service Commission of Sikkim only started functioning from which year?",
                options: ["1978", "1980", "1982", "1985"],
                answer: 2
            },
            {
                question: "Who appoints the members of the State Public Service Commission?",
                options: ["The President", "The Chief Minister", "The Governor", "The Prime Minister"],
                answer: 2
            },
            {
                question: "What is the minimum number of years of government service required for half of the members of the State Public Service Commission upon their appointment?",
                options: ["5 years", "6 years", "10 years", "12 years"],
                answer: 2
            },
            {
                question: "What is the term of office for a member of the State Public Service Commission?",
                options: ["5 years or until the age of 60, whichever is earlier", "6 years or until the age of 65, whichever is earlier", "5 years or until the age of 62, whichever is earlier", "6 years or until the age of 62, whichever is earlier"],
                answer: 3
            },
            {
                question: "The State Commission for Women in Sikkim was constituted in which year?",
                options: ["1978", "2001", "2002", "2006"],
                answer: 1
            },
            {
                question: "The Right to Information Act (RTI) came into force on which date?",
                options: ["17th July 2002", "18th August 1979", "12th October 2005", "1st December 2002"],
                answer: 2
            },
            {
                question: "In which year was the State Information Commission constituted in Sikkim?",
                options: ["2001", "2002", "2005", "2006"],
                answer: 3
            },
            {
                question: "Who was the first State Chief Information Commissioner (SCIC) of Sikkim?",
                options: ["K.T. Chankapa", "T.B. Rajalim", "D.K. Gazmere", "C.K. Century"],
                answer: 2
            },
            {
                question: "Which Article of the Constitution of India outlines the duty of the Union to protect states from external aggression and internal disturbance?",
                options: ["Article 164 (1)", "Article 315", "Article 355", "Article 356"],
                answer: 2
            },
            {
                question: "What can be imposed on a state when its government cannot be carried on in accordance with the provisions of the Constitution?",
                options: ["Governor's Rule", "President's Rule", "Financial Emergency", "Martial Law"],
                answer: 1
            },
            {
                question: "What is the maximum period for which President's Rule can remain in force in a state?",
                options: ["Six months", "One year", "Three years", "Five years"],
                answer: 2
            },
            {
                question: "How many times has President's Rule been imposed in Sikkim, and when was the first time?",
                options: ["Once, in 1984", "Twice, first in 1984", "Twice, first in 1979", "Thrice, first in 1979"],
                answer: 2
            },
            {
                question: "On what date was the first President's Rule imposed in Sikkim in 1979?",
                options: ["26.4.1979", "13.8.1979", "18.8.1979", "17.10.1979"],
                answer: 2
            },
            {
                question: "When was the President's Rule imposed in Sikkim for the second time?",
                options: ["1979", "1984", "1985", "1990"],
                answer: 1
            },
            {
                question: "Under which constitutional article did the Governor dismiss Chief Minister Bhandari in 1984?",
                options: ["Article 356", "Article 355", "Article 315", "Article 164 (1)"],
                answer: 3
            },
            {
                question: "Who was sworn in as the Chief Minister of Sikkim immediately after Mr. Bhandari's dismissal on 11.5.1984?",
                options: ["R.C. Poudyal", "Kazi Lhendup Dorjee", "B.B. Goroong", "Pawan Kumar Chamling"],
                answer: 2
            },
            {
                question: "On what date was the second President's Rule promulgated in Sikkim?",
                options: ["11.5.1984", "25.5.1984", "18.8.1979", "8.3.1985"],
                answer: 1
            },
            {
                question: "Who was the twelfth Maharaja of Sikkim, decorated with the Padma Vibhushan in 1954?",
                options: ["Kazi Lendhup Dorji Khagsharpa", "The Chogyal Palden Thondup Namgyal", "B.B. Goroong", "Nar Bahadur Bhandari"],
                answer: 1
            },
            {
                question: "Who was the first Chief Minister of Sikkim and a recipient of the Padma Vibhushan?",
                options: ["The Chogyal Palden Thondup Namgyal", "B.B. Goroong", "Nar Bahadur Bhandari", "Kazi Lendhup Dorji Khagsharpa"],
                answer: 3
            },
            {
                question: "Who received the Sahitya Akademi Award in the year 1990?",
                options: ["Girmee Sherpa", "Bhim Dahal", "Tulsi R. Kashyap", "Gadul Singh Lama"],
                answer: 2
            },
            {
                question: "Who was the recipient of the Asharani Nirman Puraskar in 1998?",
                options: ["Indra Bahadur Rai", "Samiran Chhetri 'Priyadarsi'", "Nar Bahadur Dahal", "T.B. Rai"],
                answer: 1
            },
            {
                question: "The Ashbahadur Nirman Puraskar is conferred for which achievement?",
                options: ["Best book of the year", "Best article in Nirman Magazine", "Lifetime Achievement", "Best debut author"],
                answer: 2
            },
            {
                question: "Who was the first recipient of the State Bhanu Puraskar in 1985?",
                options: ["Ram 'Apatan'", "Tulsiram Sharma 'Kashyap'", "Kashiraj Pradhan", "Kripa Salyan Rai"],
                answer: 2
            },
            {
                question: "Who received the Dr. Shova Kanti Thegim (Lepcha) Smriti Puraskar in 1998?",
                options: ["Upaman Basnet", "Rajendra Bahandari", "Sanu Lama", "Pravin Rai Jumeli"],
                answer: 3
            },
            {
                question: "How many states are members of the North East Council (NEC)?",
                options: ["Seven", "Eight", "Nine", "Ten"],
                answer: 1
            },
            {
                question: "The North East Council (NEC) was constituted under an Act of Parliament in which year?",
                options: ["1968", "1971", "2001", "2002"],
                answer: 1
            },
            {
                question: "In which year was Sikkim inducted as the eighth member of the NEC?",
                options: ["1971", "1975", "2001", "2002"],
                answer: 3
            },
            {
                question: "Where is the Secretariat of the North East Council (NEC) located?",
                options: ["Gangtok", "Guwahati", "Agartala", "Shillong"],
                answer: 3
            },
            {
                question: "Which Prime Minister is credited with the creation of the Department of North Eastern Region (DoNER)?",
                options: ["Manmohan Singh", "H. D. Deve Gowda", "Shri Atal Bihari Vajpayee", "P. V. Narasimha Rao"],
                answer: 2
            },
            {
                question: "Who was the first Chief Justice of India?",
                options: ["M. Patanjali", "Harilal J. Kania", "Meher Chand Mahajan", "B.K. Mukherjee"],
                answer: 1
            }
        ];

        const quizContainer = document.getElementById('quiz-container');

        quizData.forEach((item, index) => {
            // Create the main container for the question
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            // Create and add the question text
            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.textContent = `${index + 1}) ${item.question}`;
            questionBlock.appendChild(questionText);

            // Create the options list
            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';
            
            // Create and add each option
            item.options.forEach((option, optionIndex) => {
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    // Prevent re-answering
                    if (optionsList.classList.contains('answered')) {
                        return;
                    }
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;
                    
                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        // Highlight the correct answer
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });
                
                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            quizContainer.appendChild(questionBlock);
        });

    </script>

    <link rel="stylesheet" href="../pomodoro.css?v=3">
    <script src="../pomodoro.js?v=3"></script>
</body>
</html>
