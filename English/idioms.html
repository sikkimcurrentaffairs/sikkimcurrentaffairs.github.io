        const questionTextElement = document.getElementById('question-text');
        const optionAButton = document.getElementById('optionA');
        const optionBButton = document.getElementById('optionB');
        const optionCButton = document.getElementById('optionC');
        const optionDButton = document.getElementById('optionD');
        const feedbackElement = document.getElementById('feedback');
        const nextButton = document.getElementById('next-button');
        const progressTextElement = document.getElementById('progress-text');
        
        const optionButtons = [optionAButton, optionBButton, optionCButton, optionDButton];

        let quizQueue = [...questions]; // Use a mutable copy for the quiz queue
        const initialQuestionCount = questions.length;
        let currentQuestionObject = null; // To store the current question object

        function loadQuestion() {
            // Reset buttons and feedback for the new question
            optionButtons.forEach(button => {
                button.disabled = false;
                button.classList.remove('correct', 'incorrect', 'show-correct');
            });
            feedbackElement.textContent = '';
            feedbackElement.style.backgroundColor = 'transparent';
            nextButton.disabled = true;

            if (quizQueue.length === 0) {
                questionTextElement.textContent = "Quiz Finished! All questions answered correctly.";
                optionButtons.forEach(btn => btn.style.display = 'none');
                nextButton.style.display = 'none';
                progressTextElement.textContent = `Congratulations! All ${initialQuestionCount} initial questions cleared.`;
                return;
            }

            currentQuestionObject = quizQueue[0]; // Get the next question from the front of the queue

            let textForDisplay = currentQuestionObject.questionText;
            if (currentQuestionObject.idiom) {
                // Underline the idiom if present in the questionText
                textForDisplay = textForDisplay.replace(currentQuestionObject.idiom, `<u>${currentQuestionObject.idiom}</u>`);
            }
            // Display the question using its original ID
            questionTextElement.innerHTML = `${currentQuestionObject.id}. ${textForDisplay}`;
            
            optionAButton.textContent = `A) ${currentQuestionObject.options.A}`;
            optionBButton.textContent = `B) ${currentQuestionObject.options.B}`;
            optionCButton.textContent = `C) ${currentQuestionObject.options.C}`;
            optionDButton.textContent = `D) ${currentQuestionObject.options.D}`;

            progressTextElement.textContent = `Question ID: ${currentQuestionObject.id} | In Queue: ${quizQueue.length} (Initially: ${initialQuestionCount})`;
        }

        optionButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                const selectedOption = e.target.dataset.option;
                // currentQuestionObject is set by loadQuestion

                optionButtons.forEach(btn => btn.disabled = true); // Disable all option buttons

                if (selectedOption === currentQuestionObject.correctAnswer) {
                    e.target.classList.add('correct');
                    feedbackElement.textContent = "Correct!";
                    feedbackElement.style.color = 'white';
                    feedbackElement.style.backgroundColor = '#28a745';
                    quizQueue.shift(); // Remove correctly answered question from the front
                } else {
                    e.target.classList.add('incorrect');
                    const correctAnswerText = currentQuestionObject.options[currentQuestionObject.correctAnswer];
                    feedbackElement.innerHTML = `Incorrect. Correct: <b>${currentQuestionObject.correctAnswer})</b> ${correctAnswerText}`;
                    feedbackElement.style.color = 'white';
                    feedbackElement.style.backgroundColor = '#dc3545';
                    
                    const correctButton = optionButtons.find(btn => btn.dataset.option === currentQuestionObject.correctAnswer);
                    if(correctButton) correctButton.classList.add('show-correct');

                    // Move the incorrectly answered question to the end of the queue
                    const failedQuestion = quizQueue.shift(); // Remove from front
                    quizQueue.push(failedQuestion);          // Add to back
                }
                nextButton.disabled = false;
                nextButton.focus(); // Focus on next button for easier navigation
            });
        });

        nextButton.addEventListener('click', () => {
            loadQuestion();
        });

        // Keyboard navigation
        document.addEventListener('keydown', (event) => {
            // Process A, B, C, D only if options are enabled and quiz is ongoing
            if (!optionAButton.disabled && quizQueue.length > 0) {
                if (event.key === 'a' || event.key === 'A' || event.key === '1') {
                    optionAButton.click();
                } else if (event.key === 'b' || event.key === 'B' || event.key === '2') {
                    optionBButton.click();
                } else if (event.key === 'c' || event.key === 'C' || event.key === '3') {
                    optionCButton.click();
                } else if (event.key === 'd' || event.key === 'D' || event.key === '4') {
                    optionDButton.click();
                }
            }
             // Allow Enter for "Next Question" if it's enabled
            if (event.key === 'Enter' && !nextButton.disabled) {
                 nextButton.click();
            }
        });

        loadQuestion(); // Initial load

    </script>
