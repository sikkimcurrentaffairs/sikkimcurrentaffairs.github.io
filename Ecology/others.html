                answer: 1
            },
            {
                question: "Where cold surface air replaces warm air, the boundary separating the different bodies of air is:",
                options: ["A parallel of latitude", "A tornado", "A cold front", "A warm front"],
                answer: 2
            },
            {
                question: "What is meant by root zone process?",
                options: ["A control measure to prevent water pollution", "A process by which roots of plants are spread on the ground", "A control measure to prevent soil pollution", "None of these"],
                answer: 2
            },
            {
                question: "All oil traps contain",
                options: ["an impermeable layer", "an anticline", "a fault", "syncline"],
                answer: 0
            },
            {
                question: "In the northern hemisphere, north-facing hillsides have a _______ growing season than south-facing hillsides.",
                options: ["Shorter", "Longer", "Up", "Down"],
                answer: 0
            },
            {
                question: "Heat waves are generally considered to be little more than a nuisance and are not responsible for considerable loss of life.",
                options: ["True", "False", "", ""],
                answer: 1
            },
            {
                question: "Fog is a major hazard to aviation.",
                options: ["True", "False", "", ""],
                answer: 0
            },
            {
                question: "Suppose two unsaturated air masses mix horizontally. The resulting mixture cannot possibly be saturated.",
                options: ["True", "False", "", ""],
                answer: 1
            },
            {
                question: "To protect fruit trees from frost, it is important to keep the air as still as possible.",
                options: ["True", "False", "", ""],
                answer: 1
            },
            {
                question: "The relative humidity is often near 100 percent in the Polar Regions.",
                options: ["True", "False", "", ""],
                answer: 0
            },
            {
                question: "Stratus clouds are typically puffy and form by convection.",
                options: ["True", "False", "", ""],
                answer: 1
            }
        ];

        const wrapper = document.getElementById('questions-wrapper');

        quizData.forEach((item, index) => {
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.innerHTML = `<span class="text-green-600 dark:text-green-500 mr-2">Q${index + 1}.</span> ${item.question}`;
            questionBlock.appendChild(questionText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach((option, optionIndex) => {
                if (!option || option.trim() === '') return;
                
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    if (optionsList.classList.contains('answered')) return;
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;

                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });

                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            wrapper.appendChild(questionBlock);
        });

        // Theme sync
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
