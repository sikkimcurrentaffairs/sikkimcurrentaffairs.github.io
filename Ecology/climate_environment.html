                answer: 0
            },
            {
                question: "The gas that shows the most variation from place to place and from time to time in the lower atmosphere:",
                options: ["Ozone (O3)", "Carbon dioxide (CO2)", "Water vapour (H2O)", "Methane (CH4)"],
                answer: 2
            },
            {
                question: "The temperature to which air must be cooled in order to become saturated is the:",
                options: ["Minimum temperature", "Dew point temperature", "Wet-bulb temperature", "Freezing point"],
                answer: 1
            },
            {
                question: "The lowest temperature that can be attained by evaporating water into the air is known as the:",
                options: ["Heat index", "Minimum temperature", "Wet-bulb temperature", "Frost point"],
                answer: 2
            },
            {
                question: "On the average, about what percentage of the solar energy that strikes the outer atmosphere eventually reaches the earth's surface?",
                options: ["5%", "15%", "30%", "50%"],
                answer: 3
            },
            {
                question: "If the absolute temperature of an object doubles, the maximum energy emitted goes up by a factor of:",
                options: ["2", "4", "8", "16"],
                answer: 3
            },
            {
                question: "The global temperature has risen by about  __________ degree celsius, since the peak of last glacialisation.",
                options: ["10", "7", "8", "5"],
                answer: 2
            },
            {
                question: "The combined albedo of the earth and the atmosphere is approximately ____ percent.",
                options: ["4", "10", "30", "50"],
                answer: 2
            },
            {
                question: "The average temperature of the earth is about  __________ degree F.",
                options: ["57", "59", "67", "65"],
                answer: 1
            },
            {
                question: "Ultraviolet radiation which is not lethal but harm to the organism is",
                options: ["0.1 to 0.28", "0.28-0.32", "0.32-0.4", "0.4-0.5"],
                answer: 1
            },
            {
                question: "If all the water vapour in the atmosphere were to condense and fall to the ground, the globe would be covered with about ______ of water.",
                options: ["1 millimeter", "1 inch", "1 foot", "1 meter"],
                answer: 1
            },
            {
                question: "The total mass of water vapour stored in the atmosphere at any moment is about ____ of the world's supply of precipitation.",
                options: ["1 day", "1 week", "1 month", "1 year"],
                answer: 1
            },
            {
                question: "The sun emits a maximum amount of radiation at wavelengths near ____, while the earth emits maximum radiation near wavelengths of ____.",
                options: ["0.5 micrometers, 30 micrometers", "0.5 micrometers, 10 micrometers", "10 micrometers, 30 micrometers", "1 micrometer, 10 micrometers"],
                answer: 1
            },
            {
                question: "At which temperature would the earth be radiating energy at the greatest rate or intensity?",
                options: ["-5oF", "-40oF", "60oF", "32oF"],
                answer: 0
            },
            {
                question: "The air temperature is 45oF, the wind is blowing at 30 MPH, and the wind chill temperature is 15oF. These conditions would be equivalent to:",
                options: ["A 15oF air temperature and 0 MPH winds", "A 30oF air temperature and 45 MPH winds", "A 30oF air temperature and 15 MPH winds", "A 15oF air temperature and 30 MPH winds"],
                answer: 0
            },
            {
                question: "The geographical pattern of average air temperature near sea level is _______ homogeneous in the southern hemisphere as compared to the northern hemisphere.",
                options: ["Less", "More", "Below", "Above"],
                answer: 1
            },
            {
                question: "The dew point temperature is a measure of the total amount of water vapor in the air.",
                options: ["True", "False", "", ""],
                answer: 0
            },
            {
                question: "Carbon dioxide is a naturally-occurring component of the atmosphere.",
                options: ["True", "False", "", ""],
                answer: 0
            }
        ];

        const wrapper = document.getElementById('questions-wrapper');

        quizData.forEach((item, index) => {
            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            const questionText = document.createElement('p');
            questionText.className = 'question-text';
            questionText.innerHTML = `<span class="text-green-600 dark:text-green-500 mr-2">Q${index + 1}.</span> ${item.question}`;
            questionBlock.appendChild(questionText);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            item.options.forEach((option, optionIndex) => {
                if (!option || option.trim() === '') return;
                
                const optionItem = document.createElement('li');
                optionItem.className = 'option';
                optionItem.textContent = option;
                optionItem.dataset.index = optionIndex;

                optionItem.addEventListener('click', () => {
                    if (optionsList.classList.contains('answered')) return;
                    optionsList.classList.add('answered');

                    const selectedAnswer = parseInt(optionItem.dataset.index);
                    const correctAnswer = item.answer;

                    if (selectedAnswer === correctAnswer) {
                        optionItem.classList.add('correct');
                    } else {
                        optionItem.classList.add('incorrect');
                        optionsList.children[correctAnswer].classList.add('correct');
                    }
                });

                optionsList.appendChild(optionItem);
            });

            questionBlock.appendChild(optionsList);
            wrapper.appendChild(questionBlock);
        });

        // Theme sync
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
